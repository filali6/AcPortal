<div class="dashboard">

    <!-- Section 1 : Mes outils -->
    <div class="section">
        <h2 class="section-title">Mes outils</h2>

        <div *ngIf="myTools.length === 0" class="empty">
            Aucun outil assigné pour le moment.
        </div>

        <div class="tools-grid" *ngIf="myTools.length > 0">
            <div class="tool-card" *ngFor="let tool of myTools" (click)="openTool(tool.route)">
                <div class="tool-icon" [style.background]="tool.bg">{{ tool.icon }}</div>
                <div class="tool-info">
                    <span class="tool-name" [style.color]="tool.color">{{ tool.name }}</span>
                    <span class="tool-desc">{{ tool.description }}</span>
                    <!-- Rôles du consultant dans cet outil -->
                    <div class="tool-roles">
                        <span class="role-badge" *ngFor="let role of getRoles(tool.name)" [style.color]="tool.color"
                            [style.background]="tool.bg">
                            {{ role }}
                        </span>
                    </div>
                </div>
                <span class="tool-arrow">→</span>
            </div>
        </div>
    </div>

    <!-- Section 2 : Tableau tous les outils + rôles -->
    <div class="section">
        <h2 class="section-title">Mes rôles par outil</h2>
        <div class="roles-card">
            <table class="roles-table">
                <thead>
                    <tr>
                        <th>Outil</th>
                        <th>Rôles assignés</th>
                        <th>Accès</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let tool of myToolRoles">
                        <td>
                            <span class="tool-name-mono">{{ tool.toolName }}</span>
                        </td>
                        <td>
                            <div class="roles-list" *ngIf="tool.roles.length > 0">
                                <span class="role-tag" *ngFor="let role of tool.roles">
                                    {{ role }}
                                </span>
                            </div>
                            <span class="no-role" *ngIf="tool.roles.length === 0">—</span>
                        </td>
                        <td>
                            <span class="access-yes" *ngIf="tool.roles.length > 0">✓ Accès</span>
                            <span class="access-no" *ngIf="tool.roles.length === 0">✗ Aucun accès</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
