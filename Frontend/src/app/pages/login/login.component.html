<div style="max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">

    <h2>ACP Portal — Login</h2>

    <div style="margin-bottom: 12px;">
        <label>Email</label><br>
        <input type="email" [(ngModel)]="email" placeholder="email@acp.com"
            style="width: 100%; padding: 8px; margin-top: 4px;">
    </div>

    <div style="margin-bottom: 12px;">
        <label>Password</label><br>
        <input type="password" [(ngModel)]="password" style="width: 100%; padding: 8px; margin-top: 4px;">
    </div>

    <div *ngIf="errorMessage" style="color: red; margin-bottom: 12px;">
        {{ errorMessage }}
    </div>

    <button (click)="login()" [disabled]="loading"
        style="width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>

</div>
