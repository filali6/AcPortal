<div class="login-wrapper">
    <div class="login-card">

        <div class="brand">
            <span class="brand-logo">ACP</span>
            <span class="brand-sep"></span>
            <span class="brand-sub">Portal</span>
        </div>

        <h1 class="login-title">Connexion</h1>
        <p class="login-sub">Accédez à votre espace de travail</p>

        <div class="field">
            <label class="form-label">Email</label>
            <input type="email" [(ngModel)]="email" placeholder="email@acp.com" class="form-input" />
        </div>

        <div class="field">
            <label class="form-label">Mot de passe</label>
            <input type="password" [(ngModel)]="password" placeholder="••••••••" class="form-input" />
        </div>

        <div *ngIf="errorMessage" class="alert-error">
            {{ errorMessage }}
        </div>

        <button (click)="login()" [disabled]="loading" class="login-btn">
            <span *ngIf="!loading">Se connecter</span>
            <span *ngIf="loading" class="spinner"></span>
        </button>

    </div>
</div>
