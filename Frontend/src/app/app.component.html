<div *ngIf="showLayout" class="app-layout">

    <aside class="sidebar">

        <!-- Logo -->
        <div class="sidebar-logo">
            <div class="logo-icon-wrap">
                <lucide-icon [img]="Briefcase" size="18" color="white"></lucide-icon>
            </div>
            <span class="logo-text">ACPortal</span>
        </div>

        <!-- Nav -->
        <nav class="sidebar-nav">

            <!-- HeadOfCDS -->
            <ng-container *ngIf="isAdmin()">
                <a class="nav-item" [class.active]="isActive('admin')" (click)="navigate('/admin')">
                    <lucide-icon [img]="LayoutDashboard" size="16" class="nav-icon"></lucide-icon>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" (click)="navigate('/admin', {view: 'projects'})">
                    <lucide-icon [img]="FolderOpen" size="16" class="nav-icon"></lucide-icon>
                    <span>Projects</span>
                </a>
            </ng-container>

            <!-- PortfolioDirector -->
            <ng-container *ngIf="isDirector()">
                <a class="nav-item" [class.active]="isActive('director')" (click)="navigate('/director')">
                    <lucide-icon [img]="LayoutDashboard" size="16" class="nav-icon"></lucide-icon>
                    <span>Dashboard</span>
                </a>
            </ng-container>

            <!-- ProjectManager -->
            <ng-container *ngIf="isProjectManager()">
                <a class="nav-item" [class.active]="isActive('project-manager')" (click)="navigate('/project-manager')">
                    <lucide-icon [img]="LayoutDashboard" size="16" class="nav-icon"></lucide-icon>
                    <span>Dashboard</span>
                </a>
            </ng-container>

            <!-- TeamLead -->
            <ng-container *ngIf="isTeamLead()">
                <a class="nav-item" [class.active]="isActive('team-lead')" (click)="navigate('/team-lead')">
                    <lucide-icon [img]="LayoutDashboard" size="16" class="nav-icon"></lucide-icon>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" [class.active]="isActive('/tools-page')" (click)="navigate('/tools-page')">
                    <lucide-icon [img]="Wrench" size="16" class="nav-icon"></lucide-icon>
                    <span>Tools</span>
                </a>
            </ng-container>

            <!-- Consultant -->
            <ng-container *ngIf="isConsultant()">
                <a class="nav-item" [class.active]="isActive('/consultant')" (click)="navigate('/consultant')">
                    <lucide-icon [img]="LayoutDashboard" size="16" class="nav-icon"></lucide-icon>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" [class.active]="isActive('/tools-page')" (click)="navigate('/tools-page')">
                    <lucide-icon [img]="Wrench" size="16" class="nav-icon"></lucide-icon>
                    <span>Tools</span>
                </a>
            </ng-container>

            <!-- DAF -->
            <ng-container *ngIf="isDAF()">
                <a class="nav-item" [class.active]="isActive('daf')" (click)="navigate('/daf')">
                    <lucide-icon [img]="FileText" size="16" class="nav-icon"></lucide-icon>
                    <span>Contracts</span>
                </a>
            </ng-container>
            <!-- SuperAdmin -->
            <ng-container *ngIf="isSuperAdmin()">
                <a class="nav-item" [class.active]="isActive('super-admin')" (click)="navigate('/super-admin')">
                    <lucide-icon [img]="LayoutDashboard" size="16" class="nav-icon"></lucide-icon>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" [class.active]="isActive('super-admin/users')" (click)="navigate('/super-admin/users')">
                    <lucide-icon [img]="Users" size="16" class="nav-icon"></lucide-icon>
                    <span>Users</span>
                </a>
                <a class="nav-item" [class.active]="isActive('super-admin/tools')" (click)="navigate('/super-admin/tools')">
                    <lucide-icon [img]="Wrench" size="16" class="nav-icon"></lucide-icon>
                    <span>Tools</span>
                </a>
                <a class="nav-item" [class.active]="isActive('super-admin/workflow')" (click)="navigate('/super-admin/workflow')">
                    <lucide-icon [img]="GitBranch" size="16" class="nav-icon"></lucide-icon>
                    <span>Workflow</span>
                </a>
            </ng-container>

        </nav>

        <!-- Footer -->
        <div class="sidebar-footer">

            <!-- Notifications -->
            <app-notifications-dropdown></app-notifications-dropdown>
        
            <!-- Discussions -->
            <a class="nav-item sidebar-action" (click)="toggleDiscussions()">
                <lucide-icon [img]="MessageSquare" size="16" class="nav-icon"></lucide-icon>
                <span>Discussions</span>
            </a>
           
            <!-- Divider -->
            <div class="sidebar-divider"></div>

            <!-- User -->
            <div class="user-badge">
                <div class="user-avatar">{{ getUserInitials() }}</div>
                <div class="user-details">
                    <span class="user-name">{{ userInfo?.name }}</span>
                    <span class="user-role">{{ getRoleLabel() }}</span>
                </div>
            </div>

            <!-- Logout -->
            <a class="nav-item logout-item" (click)="logout()">
                <lucide-icon [img]="LogOut" size="16" class="nav-icon"></lucide-icon>
                <span>Log out</span>
            </a>

        </div>
    </aside>

    <!-- Main -->
    <div class="main-wrapper">
        <app-tabs-bar></app-tabs-bar>
        <app-toast></app-toast>
       
        <main class="main-content">
            <router-outlet />
        </main>
    </div>
<app-discussions-panel *ngIf="discussionsOpen" [isOpen]="discussionsOpen" (closed)="discussionsOpen = false">
</app-discussions-panel>
</div>

<!-- Toast -->
<div class="toast-notif" *ngIf="toastVisible">
    <div class="toast-body">
        <span class="toast-title">New notification</span>
        <span class="toast-message">{{ toastMessage }}</span>
    </div>
    <button class="toast-close" (click)="closeToast()">✕</button>
</div>
 

<!-- Sans layout -->
<div *ngIf="!showLayout">
    <router-outlet />
</div>
