<!-- Layout avec sidebar -->
<div *ngIf="showLayout" class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">⬡</span>
            <span class="logo-text">ACPortal</span>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" [class.active]="isActive('dashboard')" (click)="navigate('/dashboard')">
                <span class="nav-icon">▦</span>
                <span>Dashboard</span>
            </a>
            <a class="nav-item" [class.active]="isActive('tasks')" (click)="navigate('/tasks')">
                <span class="nav-icon">≡</span>
                <span>Tasks</span>
            </a>
            <a class="nav-item" [class.active]="isActive('plugins')" (click)="navigate('/plugins/axe-iam')">
                <span class="nav-icon">⬖</span>
                <span>Tools</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a class="nav-item" (click)="logout()">
                <span class="nav-icon">⏻</span>
                <span>Log out</span>
            </a>
        </div>
    </aside>

    <!-- Main -->
    <div class="main-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">{{ userInfo?.name?.charAt(0) }}</div>
                    <span class="user-name">{{ userInfo?.name }}</span>
                </div>
            </div>
        </header>

        <!-- Page content -->
        <main class="main-content">
            <router-outlet />
        </main>
    </div>

</div>

<!-- Pas de layout → juste la page (login) -->
<div *ngIf="!showLayout">
    <router-outlet />
</div>
