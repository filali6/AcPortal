services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    ports:
      - "8181:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --import-realm
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./acp-realm.json:/opt/keycloak/data/import/acp-realm.json

   

  dapr-zipkin:
    image: openzipkin/zipkin
    container_name: dapr-zipkin
    ports:
      - "9411:9411"
  
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  dapr-placement:
    image: daprio/dapr:1.13.0
    container_name: dapr-placement
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"

  
 
  plugins-db:
    image: postgres:16-alpine
    container_name: plugins-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: plugins
      POSTGRES_PASSWORD: plugins
      POSTGRES_DB: plugins
    volumes:
      - plugins-db-data:/var/lib/postgresql/data

 
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    ports:
      - "3001:3000"
    depends_on:
      - plugins-db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: plugins-db:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: plugins
      GITEA__database__PASSWD: plugins
      GITEA__server__ROOT_URL: http://localhost:3001
    volumes:
      - gitea-data:/data
  
volumes:
  kafka-data:
  keycloak-data:
  plugins-db-data:
  gitea-data:
  
  